<!DOCTYPE html>
<html>
<head>
  <title>dataweb AI Chat</title>
  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    #chat {
      flex:1;
      padding:20px;
      overflow-y:auto;
    }

    .msg {
      margin:10px 0;
      padding:10px;
      border-radius:10px;
      max-width:70%;
    }

    .user {
      background:#3b82f6;
      align-self:flex-end;
    }

    .ai {
      background:#1e293b;
      align-self:flex-start;
    }

    #inputBox {
      display:flex;
      padding:10px;
      background:#020617;
    }

    input {
      flex:1;
      padding:10px;
      border:none;
      border-radius:5px;
    }

    button {
      margin-left:10px;
      padding:10px;
      background:#22c55e;
      border:none;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type your message..." />
  <button onclick="send()">Send</button>
</div>

<script>
  const chat = document.getElementById("chat");

  function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    addMsg("Typing...", "ai");

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    chat.lastChild.remove();
    addMsg(data.reply, "ai");
  }
</script>

</body>
</html>
